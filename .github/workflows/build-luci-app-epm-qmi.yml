# .github/workflows/build.yml — luci-app-lpac-manager v1.3.0
# Unified build: lpac wrapper + lpac-esim backend + LuCI WebUI → IPK + APK
#
# Changelog:
#   1.3.0 - Renamed: package → luci-app-lpac-manager, script → lpac-esim
#           Tag trigger v*, wrapper rename lpac-wrapper.sh → lpac
#   1.2.2 - Initial build workflow

name: Build and Release luci-app-lpac-manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Package version (e.g. 1.3.0)'
        required: true
        default: '1.3.0'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-lpac-manager

    steps:
      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install nFPM and helpers
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y dos2unix curl tar jq rsync file

          # Pin nFPM to v2.35.0 to fix OpenWrt apk-tools 'v2 package format error'
          NFPM_VER="2.35.0"
          echo "Installing nFPM ${NFPM_VER}"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Assemble pkgroot from source tree
        shell: bash
        run: |
          set -euxo pipefail

          REPO_ROOT="${GITHUB_WORKSPACE}"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          # Validate source layout
          test -d "${REPO_ROOT}/src/usr/lib/lua/luci"
          test -d "${REPO_ROOT}/htdocs"
          test -d "${REPO_ROOT}/etc/config"
          test -f "${REPO_ROOT}/nfpm.yaml"

          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # 1) Lua controller + views
          mkdir -p "${PKGROOT}/usr/lib/lua/luci"
          rsync -a "${REPO_ROOT}/src/usr/lib/lua/luci/" "${PKGROOT}/usr/lib/lua/luci/"

          # 2) Backend shell scripts (lpac-esim + lpac wrapper)
          if [ -d "${REPO_ROOT}/src/usr/bin" ]; then
            mkdir -p "${PKGROOT}/usr/bin"
            rsync -a "${REPO_ROOT}/src/usr/bin/" "${PKGROOT}/usr/bin/"
            find "${PKGROOT}/usr/bin" -type f -exec chmod 0755 {} \;
          fi

          # 3) Static web resources (JS, CSS)
          if [ -d "${REPO_ROOT}/htdocs/luci-static/resources" ]; then
            mkdir -p "${PKGROOT}/www/luci-static/resources"
            rsync -a "${REPO_ROOT}/htdocs/luci-static/resources/" "${PKGROOT}/www/luci-static/resources/"
          fi

          # 4) Root overlay (menu.d, acl.d)
          if [ -d "${REPO_ROOT}/root" ]; then
            rsync -a "${REPO_ROOT}/root/" "${PKGROOT}/"
          fi

          # 5) Normalize legacy menu path
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            rsync -a "${PKGROOT}/usr/share/menu.d/" "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # 6) UCI config
          mkdir -p "${PKGROOT}/etc/config"
          if [ -f "${REPO_ROOT}/etc/config/lpac-esim" ]; then
            cp "${REPO_ROOT}/etc/config/lpac-esim" "${PKGROOT}/etc/config/lpac-esim"
          fi

          # 7) Rename wrapper lpac-wrapper.sh → lpac (if not already)
          if [ -f "${PKGROOT}/usr/bin/lpac-wrapper.sh" ] && [ ! -f "${PKGROOT}/usr/bin/lpac" ]; then
            mv "${PKGROOT}/usr/bin/lpac-wrapper.sh" "${PKGROOT}/usr/bin/lpac"
            chmod 0755 "${PKGROOT}/usr/bin/lpac"
          fi

          # 8) Normalize line endings
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \
            -o -name '*.css' -o -path '*/etc/config/*' -o -path '*/usr/bin/*' \
          \) -print0 | xargs -0 -r dos2unix

          # 9) Strip UTF-8 BOM
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.htm' -o -path '*/usr/bin/*' \
          \) -print0 | xargs -0 -r sed -i '1s/^\xef\xbb\xbf//'

          # 10) Sanity checks
          echo "=== pkgroot contents ==="
          find "${PKGROOT}" -maxdepth 8 -type f | sort

          test -f "${PKGROOT}/etc/config/lpac-esim"
          test -f "${PKGROOT}/usr/lib/lua/luci/controller/lpac_esim.lua"
          test -d "${PKGROOT}/www/luci-static/resources/lpac-esim"
          test -f "${PKGROOT}/usr/share/luci/menu.d/luci-app-lpac-esim.json"
          test -f "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-lpac-esim.json"
          test -f "${PKGROOT}/usr/bin/lpac-esim"
          test -f "${PKGROOT}/usr/bin/lpac"
          echo "All sanity checks passed."

      - name: Build IPK and APK packages
        shell: bash
        run: |
          set -euxo pipefail

          export PKG_VER="${{ env.VERSION }}"
          export SOURCE_DATE_EPOCH=1704067200

          nfpm package \
            --config nfpm.yaml \
            --packager ipk \
            --target "${PKG_NAME}_${PKG_VER}_all.ipk"
          echo "Built: ${PKG_NAME}_${PKG_VER}_all.ipk"

          unset SOURCE_DATE_EPOCH
          nfpm package \
            --config nfpm.yaml \
            --packager apk \
            --target "${PKG_NAME}_${PKG_VER}_noarch.apk"
          echo "Built: ${PKG_NAME}_${PKG_VER}_noarch.apk"

          ls -lh "${PKG_NAME}"_*
          sha256sum "${PKG_NAME}"_* || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.VERSION }}
          path: |
            *.ipk
            *.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: "Release ${{ env.VERSION }}"
          tag_name: "v${{ env.VERSION }}"
          prerelease: false
          draft: false
          body: |
            ## luci-app-lpac-manager ${{ env.VERSION }}

            Unified eSIM management package for OpenWrt.
            **Architecture: all/noarch** — works on any OpenWrt target.

            ### Includes
            - `/usr/bin/lpac` — environment wrapper for lpac binary
            - `/usr/bin/lpac-esim` — backend script (interactive + API mode)
            - LuCI web UI at **Modem → eSIM Manager**

            ### Features
            - Profile list / switch / download / delete / rename
            - QMI, AT, and MBIM backend support
            - Diagnostics: syslog viewer, soft/USB/SIM/hard reset
            - Async operations with real success/error reporting

            ### Dependencies (separate packages)
            - `luci-base`, `jq`
            - `lpac` 2.3.0+ (arch-specific)
            - QMI: `libqmi`, `qmi-utils`
            - MBIM: `libmbim`, `mbim-utils` (optional)

            ### Install
            ```sh
            # OpenWrt 24.10.x and below
            opkg update
            opkg install luci-app-lpac-manager_${{ env.VERSION }}_all.ipk
            
            # OpenWrt 25.x and Snapshots
            apk add --allow-untrusted luci-app-lpac-manager_${{ env.VERSION }}_noarch.apk
            ```
