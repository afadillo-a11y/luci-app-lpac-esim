name: Build and Release luci-app-lpac-esim

on:
  push:
    tags:
      - 'luci-v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Package version (e.g. 1.2.1)'
        required: true
        default: '1.2.1'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-lpac-esim

    steps:
      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/luci-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/luci-v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install nFPM and helpers
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y dos2unix curl tar jq rsync

          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          echo "Installing nFPM ${NFPM_VER}"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Assemble pkgroot from source tree
        shell: bash
        run: |
          set -euxo pipefail

          REPO_ROOT="${GITHUB_WORKSPACE}"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          test -d "${REPO_ROOT}"
          test -d "${REPO_ROOT}/src/usr/lib/lua/luci"
          test -d "${REPO_ROOT}/htdocs"
          test -d "${REPO_ROOT}/etc/config"
          test -f "${REPO_ROOT}/nfpm.yaml"

          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # 1) Lua controller + model + views
          mkdir -p "${PKGROOT}/usr/lib/lua/luci"
          rsync -a "${REPO_ROOT}/src/usr/lib/lua/luci/" "${PKGROOT}/usr/lib/lua/luci/"

          # 2) Static web resources (JS, CSS)
          if [ -d "${REPO_ROOT}/htdocs/luci-static/resources" ]; then
            mkdir -p "${PKGROOT}/www/luci-static/resources"
            rsync -a "${REPO_ROOT}/htdocs/luci-static/resources/" "${PKGROOT}/www/luci-static/resources/"
          fi

          # 3) ACL + menu.d from root/
          if [ -d "${REPO_ROOT}/root" ]; then
            rsync -a "${REPO_ROOT}/root/" "${PKGROOT}/"
          fi

          # 4) Normalize menu path if legacy tree appears
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            rsync -a "${PKGROOT}/usr/share/menu.d/" "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # 5) UCI config from etc/config
          mkdir -p "${PKGROOT}/etc/config"
          if [ -f "${REPO_ROOT}/etc/config/lpac-esim" ]; then
            cp "${REPO_ROOT}/etc/config/lpac-esim" "${PKGROOT}/etc/config/lpac-esim"
          fi

          # 6) Normalize line endings
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \
            -o -name '*.css' -o -path '*/etc/config/*' \
          \) -print0 | xargs -0 -r dos2unix

          # 7) Strip UTF-8 BOM if present
          find "${PKGROOT}" -type f \( -name '*.lua' -o -name '*.js' -o -name '*.htm' \) \
            -print0 | xargs -0 -r sed -i '1s/^\xef\xbb\xbf//'

          # 8) Sanity checks
          echo "=== pkgroot contents ==="
          find "${PKGROOT}" -maxdepth 6 -type f | sort

          test -f "${PKGROOT}/etc/config/lpac-esim"
          test -f "${PKGROOT}/usr/lib/lua/luci/controller/lpac_esim.lua"
          test -d "${PKGROOT}/www/luci-static/resources/lpac-esim"
          test -f "${PKGROOT}/usr/share/luci/menu.d/luci-app-lpac-esim.json"
          test -f "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-lpac-esim.json"
          echo "All sanity checks passed."

      - name: Build IPK and APK packages
        shell: bash
        run: |
          set -euxo pipefail

          export PKG_VER="${{ env.VERSION }}"
          export SOURCE_DATE_EPOCH=1704067200

          nfpm package \
            --config nfpm.yaml \
            --packager ipk \
            --target "${PKG_NAME}_${PKG_VER}_all.ipk"
          echo "Built: ${PKG_NAME}_${PKG_VER}_all.ipk"

          unset SOURCE_DATE_EPOCH
          nfpm package \
            --config nfpm.yaml \
            --packager apk \
            --target "${PKG_NAME}_${PKG_VER}_all.apk"
          echo "Built: ${PKG_NAME}_${PKG_VER}_all.apk"

          ls -lh ${PKG_NAME}_*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: "LuCI ${{ env.VERSION }}"
          tag_name: "luci-v${{ env.VERSION }}"
          prerelease: false
          draft: false
