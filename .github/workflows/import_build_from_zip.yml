name: import-from-zip

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Путь к zip внутри репозитория"
        required: true
        default: "_incoming/luci-app-lpac-esim-v1.2.1.zip"
      source_root:
        description: "Корневая папка внутри zip"
        required: true
        default: "luci-app-lpac-esim"
      commit_message:
        description: "Текст коммита"
        required: true
        default: "Import files from ZIP"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate zip exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.zip_path }}"

      - name: Unpack zip
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _workzip
          mkdir -p _workzip
          unzip -q "${{ inputs.zip_path }}" -d _workzip

      - name: Detect source root
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "_workzip/${{ inputs.source_root }}" ]; then
            echo "src=_workzip/${{ inputs.source_root }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          first_dir="$(find _workzip -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)"
          if [ -n "$first_dir" ]; then
            echo "src=$first_dir" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Cannot detect source root inside zip"
          exit 1

      - name: Validate expected zip layout
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          test -d "$SRC/htdocs"
          test -d "$SRC/src/usr/lib/lua/luci"
          test -d "$SRC/etc/config"
          test -f "$SRC/nfpm.yaml"

          echo "ZIP layout is valid"

      - name: Create target directories in repo if missing
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p htdocs
          mkdir -p src/usr
          mkdir -p src/usr/lib/lua/luci
          mkdir -p etc/config
          mkdir -p root/usr/share/luci/menu.d
          mkdir -p root/usr/share/rpcd/acl.d
          mkdir -p scripts

      - name: Import files preserving repo layout
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          # Чистим только те части дерева, которые импортируются из zip
          rm -rf htdocs/*
          rm -rf src/usr/*
          rm -rf etc/config/*
          rm -rf root/usr/share/luci/menu.d/*
          rm -rf root/usr/share/rpcd/acl.d/*
          rm -rf scripts/*

          # htdocs -> htdocs
          cp -a "$SRC/htdocs/." htdocs/

          # src/usr -> src/usr
          cp -a "$SRC/src/usr/." src/usr/

          # etc/config -> etc/config
          cp -a "$SRC/etc/config/." etc/config/

          # root/usr/share/luci/menu.d -> root/usr/share/luci/menu.d
          if [ -d "$SRC/root/usr/share/luci/menu.d" ]; then
            cp -a "$SRC/root/usr/share/luci/menu.d/." root/usr/share/luci/menu.d/
          fi

          # root/usr/share/rpcd/acl.d -> root/usr/share/rpcd/acl.d
          if [ -d "$SRC/root/usr/share/rpcd/acl.d" ]; then
            cp -a "$SRC/root/usr/share/rpcd/acl.d/." root/usr/share/rpcd/acl.d/
          fi

          # scripts -> scripts
          if [ -d "$SRC/scripts" ]; then
            cp -a "$SRC/scripts/." scripts/
          fi

          # nfpm config
          cp -a "$SRC/nfpm.yaml" nfpm.yaml

      - name: Normalize executable bits
        shell: bash
        run: |
          set -euo pipefail

          if [ -d src/usr/bin ]; then
            find src/usr/bin -type f -exec chmod +x {} \;
          fi

          if [ -d scripts ]; then
            find scripts -type f -exec chmod +x {} \;
          fi

      - name: Show git diff summary
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git diff --stat

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add htdocs src etc root scripts nfpm.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push
