# .github/workflows/import_build_from_zip.yml — v1.3.5
# Imports a development ZIP into the repository source tree layout.
# Run manually: Actions → import-from-zip → Run workflow
#
# Changelog:
#   1.3.5 - Added packaging/ directory support for Alpine APK builds
#   1.3.0 - Updated defaults for luci-app-lpac-manager naming

name: import-from-zip

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to zip inside the repository"
        required: true
        default: "_incoming/luci-app-lpac-manager-v1.3.5.zip"
      source_root:
        description: "Root folder name inside the zip"
        required: true
        default: "luci-app-lpac-manager"
      commit_message:
        description: "Commit message"
        required: true
        default: "Import luci-app-lpac-manager v1.3.5 from ZIP"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate zip exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${{ inputs.zip_path }}" ]; then
            echo "ERROR: zip not found at '${{ inputs.zip_path }}'"
            echo "Available files in _incoming/:"
            ls -la _incoming/ 2>/dev/null || echo "  (_incoming/ does not exist)"
            exit 1
          fi

      - name: Unpack zip
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _workzip
          mkdir -p _workzip
          unzip -q "${{ inputs.zip_path }}" -d _workzip
          echo "=== ZIP contents (top 2 levels) ==="
          find _workzip -maxdepth 2 -type f | sort | head -30

      - name: Detect source root
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "_workzip/${{ inputs.source_root }}" ]; then
            echo "src=_workzip/${{ inputs.source_root }}" >> "$GITHUB_OUTPUT"
            echo "Found exact match: _workzip/${{ inputs.source_root }}"
            exit 0
          fi

          first_dir="$(find _workzip -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)"
          if [ -n "$first_dir" ]; then
            echo "src=$first_dir" >> "$GITHUB_OUTPUT"
            echo "Using first directory: $first_dir"
            exit 0
          fi

          echo "ERROR: Cannot detect source root inside zip"
          exit 1

      - name: Validate expected zip layout
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          test -d "$SRC/htdocs"
          test -d "$SRC/src/usr/lib/lua/luci"
          test -d "$SRC/etc/config"
          test -f "$SRC/nfpm.yaml"

          echo "ZIP layout validated OK"
          echo "=== Source tree ==="
          find "$SRC" -maxdepth 3 -type f | sort | head -40

      - name: Create target directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p htdocs
          mkdir -p src/usr/bin
          mkdir -p src/usr/lib/lua/luci
          mkdir -p etc/config
          mkdir -p root/usr/share/luci/menu.d
          mkdir -p root/usr/share/rpcd/acl.d
          mkdir -p scripts
          mkdir -p packaging/apk

      - name: Import files preserving repo layout
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ steps.detect.outputs.src }}"

          # Clean only the parts we are importing
          rm -rf htdocs/*
          rm -rf src/usr/*
          rm -rf etc/config/*
          rm -rf root/usr/share/luci/menu.d/*
          rm -rf root/usr/share/rpcd/acl.d/*
          rm -rf scripts/*
          rm -rf packaging/*

          # Copy each component
          cp -a "$SRC/htdocs/." htdocs/
          cp -a "$SRC/src/usr/." src/usr/
          cp -a "$SRC/etc/config/." etc/config/

          if [ -d "$SRC/root/usr/share/luci/menu.d" ]; then
            cp -a "$SRC/root/usr/share/luci/menu.d/." root/usr/share/luci/menu.d/
          fi

          if [ -d "$SRC/root/usr/share/rpcd/acl.d" ]; then
            cp -a "$SRC/root/usr/share/rpcd/acl.d/." root/usr/share/rpcd/acl.d/
          fi

          if [ -d "$SRC/scripts" ]; then
            cp -a "$SRC/scripts/." scripts/
          fi

          if [ -d "$SRC/packaging" ]; then
            cp -a "$SRC/packaging/." packaging/
          fi

          # Copy nFPM config
          cp -a "$SRC/nfpm.yaml" nfpm.yaml

          # Do NOT overwrite .github/workflows — those are managed separately

      - name: Normalize permissions
        shell: bash
        run: |
          set -euo pipefail
          # Ensure execution rights for all binary and installation scripts
          find src/usr/bin -type f -exec chmod +x {} \; 2>/dev/null || true
          find scripts -type f -exec chmod +x {} \; 2>/dev/null || true
          find packaging/apk -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Post-import validation
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Imported files ==="
          find src htdocs etc root scripts packaging -type f | sort
          echo ""
          echo "=== Key files check ==="
          test -f src/usr/bin/lpac-esim && echo "OK: lpac-esim backend" || echo "WARN: lpac-esim not found"
          test -f src/usr/lib/lua/luci/controller/lpac_esim.lua && echo "OK: Lua controller" || echo "WARN: controller not found"
          test -f nfpm.yaml && echo "OK: nfpm.yaml" || echo "WARN: nfpm.yaml not found"
          test -d packaging/apk && echo "OK: Alpine APK packaging structure" || echo "WARN: packaging/apk directory not found"

      - name: Show git diff summary
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git diff --stat

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add all imported components to the commit
          git add htdocs src etc root scripts packaging nfpm.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push
